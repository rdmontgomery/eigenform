<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>woland</title>
    <link rel="stylesheet" href="/dist/main.css" />
    <style>
      html, body { margin: 0; height: 100%; background: #0b0b0e; }
      #app { display: grid; grid-template-columns: 1fr 1fr; height: 100vh; }
      #terminal { height: 100%; padding: 6px; box-sizing: border-box; overflow: hidden; }
      #transcript { border: 0; border-left: 1px solid #1c1c24; height: 100%; width: 100%; }
      /* left = faithful pty (ground truth); right = our semantic re-render */
    </style>
  </head>
  <body>
    <div id="app">
      <div id="terminal"></div>
      <iframe id="transcript" title="semantic transcript"></iframe>
    </div>
    <script type="module" src="/dist/main.js"></script>
  </body>
</html>
